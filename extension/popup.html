<!DOCTYPE html>
<html>
<head>
  <title>Privacy Guardian AI</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      padding: 12px;
      width: 280px;
    }

    h2 {
      font-size: 16px;
      margin-bottom: 10px;
      text-align: center;
    }

    .card {
      background: #1e293b;
      padding: 10px;
      border-radius: 10px;
      margin-top: 10px;
    }

    .label {
      font-weight: bold;
      color: #38bdf8;
    }

    .value {
      margin-bottom: 6px;
      font-size: 13px;
    }

    .trackers {
      font-size: 12px;
      color: #facc15;
      margin-top: 5px;
    }

    .safe {
      color: #22c55e;
    }

    .danger {
      color: #ef4444;
    }
  </style>
</head>
<body>

  <h2>🔐 Privacy Guardian AI</h2>

  <div id="result" class="card">
    Loading...
  </div>

  <script>
  chrome.storage.local.get("siteData", (res) => {
    const d = res.siteData;

    if (!d) {
      document.getElementById("result").innerHTML = "No data found";
      return;
    }

    let risk = 0;
    let reasons = [];

    if (d.trackers.length > 0) {
      risk += d.trackers.length * 10;
      reasons.push(`${d.trackers.length} trackers detected`);
    }

    if (d.cookies) {
      risk += 10;
      reasons.push("Cookies are enabled");
    }

    if (d.location) {
      risk += 20;
      reasons.push("Location access possible");
    }

    if (d.camera) {
      risk += 20;
      reasons.push("Camera access possible");
    }

    if (risk > 100) risk = 100;

    let riskLabel = risk < 30 ? "SAFE" : risk < 70 ? "MEDIUM" : "HIGH";
    let riskColor =
      risk < 30 ? "safe" : risk < 70 ? "trackers" : "danger";

    document.getElementById("result").innerHTML = `
      <div class="value"><span class="label">URL:</span><br>${d.url}</div>

      <div class="value">
        <span class="label">Risk Score:</span>
        <span class="${riskColor}">${risk}% (${riskLabel})</span>
      </div>

      <div class="value">
        <span class="label">Trackers:</span><br>
        ${
          d.trackers.length > 0
            ? `<div class="trackers">${d.trackers.join(", ")}</div>`
            : `<span class="safe">None</span>`
        }
      </div>

      <div class="value">
        <span class="label">WHY RISK?</span>
        <ul style="font-size:12px; margin-top:5px;">
          ${reasons.map(r => `<li>${r}</li>`).join("")}
        </ul>
      </div>
    `;
  });
</script>

</body>
</html>
